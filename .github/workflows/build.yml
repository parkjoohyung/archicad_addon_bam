name: Build ArchiCAD Add-ons (macOS & Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build for macOS (AC27 & AC29)
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download & Extract ArchiCAD Mac SDKs
        run: |
          mkdir -p sdks
          
          echo "Downloading ArchiCAD 27 Mac SDK..."
          curl -L -o sdks/sdk_27.zip "https://github.com/parkjoohyung/archicad_addon_bam/releases/download/sdks/API_Development_Kit_27_Mac.zip"
          unzip -q sdks/sdk_27.zip -d sdks/sdk_27
          
          echo "Downloading ArchiCAD 29 Mac SDK..."
          curl -L -o sdks/sdk_29.zip "https://github.com/parkjoohyung/archicad_addon_bam/releases/download/sdks/API_Development_Kit_29_Mac.zip"
          unzip -q sdks/sdk_29.zip -d sdks/sdk_29

      - name: Build ArchiCAD 27 (macOS)
        run: |
          cd AddOnCommandTest
          mkdir Build
          cd Build
          cmake .. -G Xcode -DAC_API_DEVKIT_DIR="../../sdks/sdk_27"
          cmake --build . --config Release

      - name: Build ArchiCAD 29 (macOS)
        run: |
          cd AddOnCommandTest_29
          mkdir Build
          cd Build
          cmake .. -G Xcode -DAC_API_DEVKIT_DIR="../../sdks/sdk_29"
          cmake --build . --config Release

      - name: Upload macOS Bundles
        uses: actions/upload-artifact@v3
        with:
          name: macos-binaries
          path: |
            AddOnCommandTest/Build/Release/*.bundle
            AddOnCommandTest_29/Build/Release/*.bundle


