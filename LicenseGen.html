<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BAM Addon License Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
        
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        button.secondary { background: #34a853; }
        button.danger { background: #d93025; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #f8f9fa; color: #555; text-align: left; padding: 12px; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background: #f1f8ff; }
        
        .actions { margin-top: 20px; display: flex; gap: 10px; }
        .hash-list { background: #202124; color: #34a853; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; margin-top: 15px; display: none; white-space: pre; }
        
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; background: #e8f0fe; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>BAM License Manager</h2>
        <div class="grid">
            <div class="form-group">
                <label>User Email</label>
                <input type="text" id="email" placeholder="user@email.com">
            </div>
            <div class="form-group">
                <label>License Key</label>
                <input type="text" id="key" placeholder="Click Random ->">
            </div>
            <div style="display: flex; gap: 5px;">
                <button onclick="randomKey()">Random</button>
                <button class="secondary" onclick="addNewLicense()">Add License</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0;">Issued Licenses</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="searchInput" onkeyup="render()" placeholder="Search by email..." style="padding: 8px; font-size: 13px; width: 180px;">
                <button onclick="exportCSV()" style="background: #5f6368; font-size: 12px; padding: 8px 10px;">Export CSV</button>
                <button onclick="exportHashTXT()" style="background: #34a853; font-size: 12px; padding: 8px 10px;">Export licenses.txt</button>
                <button onclick="toggleHashList()" style="background: #8ab4f8; color: #202124; font-size: 12px; padding: 8px 10px;">Copy View</button>
            </div>
        </div>

        <div id="hashListArea" class="hash-list"></div>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Email</th>
                    <th>License Key</th>
                    <th>Hash (for GitHub)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="licenseTable">
                <!-- Data will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    let licenses = JSON.parse(localStorage.getItem('bam_licenses') || '[]');

    function save() {
        localStorage.setItem('bam_licenses', JSON.stringify(licenses));
        render();
    }

    function randomKey() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let key = 'BAM-';
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 4; j++) key += chars.charAt(Math.floor(Math.random() * chars.length));
            if (i < 2) key += '-';
        }
        document.getElementById('key').value = key;
    }

    function fnv1a64(str) {
        let hash = BigInt("0xcbf29ce484222325");
        const prime = BigInt("0x100000001b3");
        const encoder = new TextEncoder();
        const data = encoder.encode(str);
        for (let byte of data) {
            hash ^= BigInt(byte);
            hash = BigInt.asUintN(64, hash * prime);
        }
        return hash.toString(16).padStart(16, '0');
    }

    function addNewLicense() {
        const email = document.getElementById('email').value.trim();
        const key = document.getElementById('key').value.trim();
        if (!email || !key) return alert("Enter both email and key!");

        const combined = email + "|" + key + "|Salt!Secret2026";
        const hash = fnv1a64(combined);
        const date = new Date().toLocaleDateString();

        licenses.unshift({ date, email, key, hash });
        save();
        
        document.getElementById('email').value = '';
        document.getElementById('key').value = '';
    }

    function deleteLicense(index) {
        if (confirm("Delete this license?")) {
            licenses.splice(index, 1);
            save();
        }
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = licenses.filter(l => l.email.toLowerCase().includes(query));
        
        const tbody = document.getElementById('licenseTable');
        tbody.innerHTML = filtered.map((l, i) => `
            <tr>
                <td>${l.date}</td>
                <td><b>${l.email}</b></td>
                <td><code class="badge">${l.key}</code></td>
                <td><small style="color:#888">${l.hash}</small></td>
                <td><button class="danger" style="padding: 5px 10px; font-size: 11px;" onclick="deleteLicense(${i})">Del</button></td>
            </tr>
        `).join('');

        const hashArea = document.getElementById('hashListArea');
        hashArea.innerText = licenses.map(l => l.hash).join('\n');
    }

    function toggleHashList() {
        const area = document.getElementById('hashListArea');
        if (area.style.display === 'block') {
            area.style.display = 'none';
        } else {
            area.style.display = 'block';
            alert("Copy the green text below and paste it into your GitHub licenses.txt file.");
        }
    }

    async function exportHashTXT() {
        const hashContent = licenses.map(l => l.hash).join('\n');
        if ('showSaveFilePicker' in window) {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: 'licenses.txt',
                    types: [{ description: 'Text Files', accept: {'text/plain': ['.txt']} }],
                });
                const writable = await handle.createWritable();
                await writable.write(hashContent);
                await writable.close();
                alert("File updated successfully!");
                return;
            } catch (err) { if (err.name === 'AbortError') return; }
        }
        const blob = new Blob([hashContent], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'licenses.txt');
        a.click();
    }

    function exportCSV() {
        let csv = "Date,Email,LicenseKey,Hash\n";
        licenses.forEach(l => {
            csv += `${l.date},${l.email},${l.key},${l.hash}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', 'BAM_Licenses_Backup.csv');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    render();
</script>

</body>
</html>
