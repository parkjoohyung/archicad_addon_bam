name: Build ArchiCAD Add-ons (macOS & Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build for macOS (AC27 & AC29)
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Download & Extract ArchiCAD Mac SDKs
        run: |
          mkdir -p sdks
          
          echo "Downloading ArchiCAD 28 Mac SDK..."
          curl -L -o sdks/sdk_28.zip "https://github.com/GRAPHISOFT/archicad-api-devkit/releases/download/28.4001/API.Development.Kit.MAC.28.4001.zip"
          unzip -q sdks/sdk_28.zip -d sdks/sdk_28
          
          echo "Downloading ArchiCAD 29 Mac SDK..."
          curl -L -o sdks/sdk_29.zip "https://github.com/GRAPHISOFT/archicad-api-devkit/releases/download/29.3100/API.Development.Kit.MAC.29.3100.zip"
          unzip -q sdks/sdk_29.zip -d sdks/sdk_29

      - name: Build ArchiCAD 28 (macOS)
        run: |
          cd AddOnCommandTest
          mkdir Build28
          cd Build28
          cmake .. -G Xcode -DAC_API_DEVKIT_DIR="../../sdks/sdk_28"
          cmake --build . --config Release

      - name: Build ArchiCAD 29 (macOS)
        run: |
          cd AddOnCommandTest_29
          mkdir Build29
          cd Build29
          cmake .. -G Xcode -DAC_API_DEVKIT_DIR="../../sdks/sdk_29"
          cmake --build . --config Release

      - name: Upload macOS Bundles
        uses: actions/upload-artifact@v3
        with:
          name: macos-binaries
          path: |
            AddOnCommandTest/Build28/Release/*.bundle
            AddOnCommandTest_29/Build29/Release/*.bundle


