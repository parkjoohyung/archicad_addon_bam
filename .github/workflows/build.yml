name: Build ArchiCAD Add-ons (macOS & Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build for macOS (AC28 & AC29)
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download & Extract ArchiCAD Mac SDKs
        run: |
          mkdir -p sdks
          
          echo "Downloading ArchiCAD 28 Mac SDK..."
          curl --retry 5 --retry-delay 5 -L -o sdks/sdk_28.zip "https://github.com/GRAPHISOFT/archicad-api-devkit/releases/download/28.4001/API.Development.Kit.MAC.28.4001.zip"
          unzip -q sdks/sdk_28.zip -d sdks/sdk_28
          
          echo "Downloading ArchiCAD 29 Mac SDK..."
          curl --retry 5 --retry-delay 5 -L -o sdks/sdk_29.zip "https://github.com/GRAPHISOFT/archicad-api-devkit/releases/download/29.3000/API.Development.Kit.MAC.29.3000.zip"
          unzip -q sdks/sdk_29.zip -d sdks/sdk_29

          echo "Making OSX tools executable..."
          chmod -R +x sdks/sdk_28/Support/Tools/OSX || true
          chmod -R +x sdks/sdk_29/Support/Tools/OSX || true

      - name: Build ArchiCAD 28 (macOS)
        run: |
          cd AddOnCommandTest
          rm -rf Build28
          mkdir Build28
          cd Build28
          cmake .. -G Xcode -DAC_API_DEVKIT_DIR="../../sdks/sdk_28" -DCMAKE_OSX_DEPLOYMENT_TARGET="10.15"
          cmake --build . --config Release -- -jobs 4 CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Build ArchiCAD 29 (macOS)
        run: |
          cd AddOnCommandTest_29
          rm -rf Build29
          mkdir Build29
          cd Build29
          cmake .. -G Xcode -DAC_API_DEVKIT_DIR="../../sdks/sdk_29" -DCMAKE_OSX_DEPLOYMENT_TARGET="10.15" -DCMAKE_OSX_ARCHITECTURES="arm64"
          cmake --build . --config Release -- -jobs 4 CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Upload macOS Bundles
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: |
            AddOnCommandTest/Build28/Release/*.bundle
            AddOnCommandTest_29/Build29/Release/*.bundle


